  <script>
    const loader = document.getElementById('loader');
    const bar = document.getElementById('progress-bar');
    const label = document.getElementById('progress-label');
    let currentPct = 0;
    let done = false;

    function setProgress(pct) {
      currentPct = pct;
      bar.style.width = pct + '%';
      label.textContent = pct + '%';
    }

    const steps = [
      { pct: 15, delay: 300 },
      { pct: 35, delay: 1000 },
      { pct: 55, delay: 2200 },
      { pct: 70, delay: 3500 },
      { pct: 82, delay: 5000 },
    ];

    steps.forEach(function(s) {
      setTimeout(function() {
        if (!done) setProgress(s.pct);
      }, s.delay);
    });

    function finish() {
      if (done) return;
      done = true;
      setProgress(100);
      setTimeout(function() {
        loader.classList.add('fade-out');
        setTimeout(function() {
          loader.style.display = 'none';
        }, 700);
      }, 400);
    }

    window.addEventListener('message', function(e) {
      if (e.origin.includes('figma.com')) {
        setTimeout(finish, 500);
      }
    });

    setTimeout(finish, 8000);
  </script>
